<script>
    // Quote system (unchanged)
    const quotes = [
        { text: "Sometimes even to live is an act of courage.", author: "Seneca" },
        { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
        { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
        { text: "Your limitation—it’s only your imagination.", author: "Unknown" },
        { text: "Difficulties strengthen the mind, as labor does the body.", author: "Seneca" }
    ];

    function getQuote() {
        let savedQuote = localStorage.getItem("randomQuote");
        if (!savedQuote) {
            let randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            localStorage.setItem("randomQuote", JSON.stringify(randomQuote));
            return randomQuote;
        }
        return JSON.parse(savedQuote);
    }

    document.addEventListener("DOMContentLoaded", function () {
        let quote = getQuote();
        document.getElementById("quote").innerHTML = `"${quote.text}" <br><br>— ${quote.author}`;
    });

    window.addEventListener("beforeunload", function () {
        localStorage.removeItem("randomQuote");
    });
</script>
